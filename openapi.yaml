openapi: 3.0.3
info:
  title: CPFHub.io API
  version: 1.0.0
  description: |
    Especificação OpenAPI oficial da API CPFHub.io.

    Consulte dados de identidade (nome, gênero, data de nascimento) a partir de um CPF brasileiro.

    Todas as requisições requerem uma API Key enviada no header `x-api-key`.
    Acesse https://app.cpfhub.io para gerar sua chave.
  contact:
    name: Suporte CPFHub
    url: https://cpfhub.io
    email: support@cpfhub.io
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://cpfhub.io/termos-de-uso

servers:
  - url: https://api.cpfhub.io
    description: Produção

tags:
  - name: CPF
    description: Operações de consulta de CPF

security:
  - ApiKeyAuth: []

paths:
  /cpf/{cpf}:
    get:
      tags:
        - CPF
      summary: Consultar CPF
      operationId: getPersonByCpf
      description: |
        Consulta um CPF e retorna dados estruturados incluindo nome, data de nascimento e gênero.

        **Importante:** CPFs não encontrados na base de dados não consomem crédito.
        Apenas requisições que retornam dados são contabilizadas no plano.
      parameters:
        - $ref: '#/components/parameters/Cpf'
        - in: header
          name: Accept
          required: false
          schema:
            type: string
            default: application/json
            example: application/json
      responses:
        '200':
          description: Consulta realizada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CpfResponse'
        '400':
          description: Requisição inválida — CPF mal formatado ou parâmetro ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                data: null
                error:
                  message: "CPF inválido"
        '401':
          description: Não autorizado — API Key inválida ou ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                data: null
                error:
                  message: "Chave de API inválida ou ausente"
        '404':
          description: CPF não encontrado na base de dados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                data: null
                error:
                  message: "CPF não encontrado"
        '429':
          description: |
            Muitas requisições — limite de taxa excedido.

            Os headers da resposta incluem informações sobre o limite e quando ele será resetado.

            Limites por plano:
            - Gratuito: 1 requisição a cada 2 segundos
            - Pro: 1 requisição por segundo
            - Corporativo: personalizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                data: null
                error:
                  message: "Limite de requisições excedido"
        '500':
          description: Erro interno do servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                data: null
                error:
                  message: "Erro interno do servidor"
        '503':
          description: Serviço temporariamente indisponível.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                data: null
                error:
                  message: "Serviço temporariamente indisponível"

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: API Key gerada em https://app.cpfhub.io

  parameters:
    Cpf:
      in: path
      name: cpf
      required: true
      description: CPF com somente números, sem pontuação (11 dígitos).
      schema:
        type: string
        pattern: '^\d{11}$'
        example: "31592165869"

  schemas:
    CpfResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          description: Indica se a consulta foi bem-sucedida.
          example: true
        data:
          $ref: '#/components/schemas/CpfData'

    CpfData:
      type: object
      properties:
        cpf:
          type: string
          description: CPF consultado (somente números).
          example: "00000000000"
        name:
          type: string
          description: Nome completo.
          example: "Fulano de Tal"
        nameUpper:
          type: string
          description: Nome completo em maiúsculas.
          example: "FULANO DE TAL"
        gender:
          type: string
          description: Gênero (M = masculino, F = feminino).
          enum:
            - M
            - F
          example: "M"
        birthDate:
          type: string
          description: Data de nascimento no formato DD/MM/YYYY.
          example: "15/06/1990"
        day:
          type: integer
          description: Dia de nascimento.
          minimum: 1
          maximum: 31
          example: 15
        month:
          type: integer
          description: Mês de nascimento.
          minimum: 1
          maximum: 12
          example: 6
        year:
          type: integer
          description: Ano de nascimento.
          example: 1990

    ErrorResponse:
      type: object
      required:
        - success
        - data
        - error
      properties:
        success:
          type: boolean
          description: Sempre false em respostas de erro.
          example: false
        data:
          nullable: true
          description: Sempre null em respostas de erro.
          example: null
        error:
          type: object
          required:
            - message
          properties:
            message:
              type: string
              description: Mensagem descritiva do erro em português.
              example: "CPF inválido"
